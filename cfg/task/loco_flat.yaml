# @package task
name: loco_flat

viewer:
  resolution: [1280, 720]
  lookat: [0., 0., 0.]
  eye: [4.0, 4.0, 4.0]

robot: 
  name: g1_waist_unlocked
terrain: plane

# common
num_envs: 8192
max_episode_length: 1000

sim:
  step_dt: 0.02
  isaac_physics_dt: 0.005
  mujoco_physics_dt: 0.002

input:
  action:
    _target_: JointPosition
    action_scaling: 
      .*hip_pitch.*: 0.548
      .*hip_roll.*: 0.351
      .*hip_yaw.*: 0.548
      .*knee.*: 0.351
      waist_yaw_joint: 0.541
      waist_roll_joint: 0.439
      waist_pitch_joint: 0.439
      .*ankle.*: 0.439
      .*shoulder.*: 0.173
      .*elbow_joint: 0.173
      # .*wrist_roll.*: 0.173
      # .*wrist_pitch.*: 0.293
      # .*wrist_yaw.*: 0.293
    max_delay: 2
    alpha_range: [0.8, 1.0]

command:
  _target_: Twist
  linvel_x_range: [-0.5, 1.2]
  linvel_y_range: [-0.8, 0.8]
  angvel_range: [-1.5, 1.5]
  yaw_stiffness_range: [0.5, 1.0]
  use_stiffness_ratio: 0.9
  stand_prob: 0.05
  curriculum: false

observation:
  # command:
  policy:
    command: {}
    root_angvel_b:    {noise_std: 0.05}
    gravity_multistep: {steps: 4, noise_std: 0.05}
    joint_pos_multistep: {joint_names: "(?!(.*wrist.*)).*", steps: 4, noise_std: 0.05}
    joint_vel_multistep: {joint_names: "(?!(.*wrist.*)).*", steps: 4, noise_std: 0.2}
    prev_actions: {steps: 2}
  # priv:
    # root_linvel_b:    {}
    # root_angvel_b:  {noise_std: 0.05}
    # body_height:  {body_names: .*ankle_roll_link}

reward:
  loco:
    linvel_exp:         {weight: 1.5, dim: 2}
    linvel_projection:  {weight: 0.5}
    angvel_z_exp:       {weight: 1.2, gamma: 0.8}
    angvel_xy_l2:       {weight: 0.05, body_names: ["pelvis", "torso_link"]}
    linvel_z_l2:        {weight: 0.5}
    tracking_base_height: {weight: 3.0, target_height: 0.78}
    single_foot_contact: {weight: 0.2, body_names: .*ankle_roll_link, margin: 0.1}

    energy_l1:          {weight: 2.0e-4}
    joint_acc_l2:       {weight: 1.0e-7}
    joint_torques_l2:   {weight: 5.0e-6}
    body_upright:       {weight: 2.0, body_name: "torso_link"}
    survival:           {weight: 1.0}
    action_rate_l2:     {weight: 0.005}
    action_rate2_l2:    {weight: 0.01}
    feet_gait:          {weight: 0.5, body_names: .*ankle_roll_link, period: 0.8, offset: [0.0, 0.5], threshold: 0.55}
    feet_sliding:       {weight: 0.3, body_names: .*ankle_roll_link}
    foot_clearance:     {weight: 1.0, body_names: .*ankle_roll_link, target_height: 0.1, std: 0.05, tanh_mult: 2.0}
    # Keep the waist markedly stiffer than the arms so the torso does not pitch back.
    waist_joint_vel_l2:
      _target_: joint_vel_l2
      weight: 2.0e-3
      joint_names: waist.*
    arm_joint_vel_l2:
      _target_: joint_vel_l2
      weight: 7.5e-4
      joint_names: [.*shoulder.*, .*elbow_joint]
    waist_joint_deviation_l2:
      _target_: joint_deviation_l2
      weight: 1.0
      joint_names: waist.*
    arm_joint_deviation_l2:
      _target_: joint_deviation_l2
      weight: 0.25
      joint_names: [.*shoulder.*, .*elbow_joint]
  debug:
    _enabled_: false
    feet_contact_count: {weight: 1.0, body_names: .*ankle_roll_link}

randomization:
  perturb_body_mass:
    .*: [0.8, 1.2]
  perturb_body_materials:
    body_names: ".*ankle_roll_link"
    static_friction_range: [0.6, 2.0]
    dynamic_friction_range: [0.6, 2.0]
    restitution_range: [0.0, 0.2]
  motor_params:
    stiffness_range:
      .*: [0.8, 1.1]
    damping_range:
      .*: [0.8, 1.1]
  reset_joint_states_uniform:
    pos_ranges:
      .*: [-0.1, 0.1]
    rel: true
  push_body:
    body_names: "torso_link"
    force_range: [20, 100]
    min_interval: 100
    decay: 0.9

termination:
  crash: 
    body_names_expr:
    - "pelvis"
    - "torso_link"
    - ".*_hip_.*_link"
    - ".*shoulder_.*_link"
    - ".*(wrist|elbow).*"
  fall_over: {xy_thres: 0.9}
